name: Update lotto winning numbers

on:
  # 매주 일요일 02:00 KST (= 토요일 17:00 UTC) — 추첨 토요일 21:00 KST 후 안전한 시점
  schedule:
    - cron: '0 17 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest winning numbers
        run: node scripts/fetch-winning-numbers.mjs

      - name: Commit if changed
        run: |
          if [[ -n $(git status --porcelain public/data/winning-numbers.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/winning-numbers.json
            LATEST=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/data/winning-numbers.json','utf8'))[0].round)")
            git commit -m "Update lotto data — round ${LATEST}"
            git push
            echo "✅ Committed round ${LATEST}"
          else
            echo "ℹ️ No changes (data already up to date)"
          fi
